spring:
  application:
    name: demo

  datasource:
    url: jdbc:mysql://localhost:3306/School_Database?createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB  

jwt:
  secret: 7a9f3c2e1b8d4f6a0e5c9b3d7f2a4e8c1d5f9b3a7c0e2f4a6d8b0c2e4f6a8b0d
  expiration-ms: 86400000

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true